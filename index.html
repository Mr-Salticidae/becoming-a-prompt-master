<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目标是成为 Prompt 大师</title>
<meta name="description" content="面向 AIGC 小白的 prompt 拆解系列:每期一个主题,讲清难在哪、怎么破题、完整 prompt 与四层拆解。不追结果,记录过程。">
<style>
  :root{
    --bg:#F4EEE7; --ink:#2F2D2A; --muted:#8C8479; --hair:#D5CBBE; --card:#FBF7F1;
    --narr:#2E8B73; --style:#6A6FB5; --trans:#C68A33; --neg:#BF5638;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.8; -webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px; margin:0 auto; padding:0 24px}

  /* 刊头 */
  header{text-align:center; padding:72px 24px 28px}
  .masthead{display:flex; align-items:center; justify-content:center; gap:18px;
    color:var(--muted); font-size:13px; letter-spacing:.34em; margin-bottom:30px}
  .masthead::before,.masthead::after{content:""; width:54px; height:1px; background:var(--hair)}
  h1{font-size:clamp(34px,7vw,60px); font-weight:600; letter-spacing:.08em; cursor:pointer}
  .tagline{color:var(--muted); margin-top:16px; font-size:15px}
  .accent{display:flex; justify-content:center; gap:10px; margin-top:26px}
  .accent span{width:46px; height:5px; border-radius:3px}
  .intro{max-width:680px; margin:14px auto 0; text-align:center; color:#5f5a52; font-size:15.5px; padding:0 24px}

  /* 分类筛选 */
  .filters{display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:34px 0 6px}
  .chip-f{font:inherit; font-size:14px; cursor:pointer; background:transparent; color:var(--muted);
    border:1px solid var(--hair); border-radius:999px; padding:7px 16px;
    transition:background .2s, border-color .2s, color .2s}
  .chip-f:hover{border-color:var(--muted); color:var(--ink)}
  .chip-f.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}
  .chip-f .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align:middle}

  /* 目录:封面墙 */
  .catalog{display:grid; grid-template-columns:repeat(3,1fr); gap:26px; padding:30px 0 8px}
  @media(max-width:820px){.catalog{grid-template-columns:repeat(2,1fr); gap:18px}}
  @media(max-width:520px){.catalog{grid-template-columns:1fr}}
  .card{cursor:pointer; display:flex; flex-direction:column; background:var(--card);
    border:1px solid var(--hair); border-radius:14px; overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease}
  .card:hover{transform:translateY(-4px); box-shadow:0 16px 36px rgba(80,60,40,.16)}
  .card .cover{width:100%; aspect-ratio:3/4; overflow:hidden; background:#e9e1d6}
  .card .cover img{width:100%; height:100%; object-fit:cover; display:block}
  .card-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:13px 15px}
  .card-no{color:var(--muted); font-size:12.5px; letter-spacing:.14em}
  .tag{font-size:12px; padding:3px 10px; border-radius:999px; color:#fff; white-space:nowrap}

  /* 详情页 */
  .back{display:inline-flex; align-items:center; gap:7px; margin:30px 0 6px; cursor:pointer;
    color:var(--muted); font-size:14px; background:none; border:none; font:inherit; padding:6px 0; transition:color .2s}
  .back:hover{color:var(--ink)}
  .detail{padding:6px 0 24px}
  .ep{padding:18px 0 36px}
  .ep-head{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-bottom:6px}
  .ep-no{color:var(--muted); font-size:13px; letter-spacing:.18em}
  .ep-title{font-size:28px; font-weight:600; letter-spacing:.04em}
  .ep-sub{color:var(--muted); font-size:15px; margin-bottom:26px}

  .gallery{display:grid; grid-template-columns:repeat(2,1fr); gap:20px}
  @media(max-width:640px){.gallery{grid-template-columns:1fr}}
  figure{margin:0}
  figure img{width:100%; height:auto; display:block; border-radius:12px; border:1px solid var(--hair);
    cursor:zoom-in; transition:transform .25s ease, box-shadow .25s ease}
  figure img:hover{transform:translateY(-3px); box-shadow:0 12px 30px rgba(80,60,40,.14)}
  figcaption{text-align:center; color:var(--muted); font-size:13px; margin-top:10px}
  .original{margin-top:24px}
  .original img{border-radius:14px}
  figcaption a{color:var(--trans); text-decoration:none; border-bottom:1px solid transparent}
  figcaption a:hover{border-bottom-color:var(--trans)}

  /* 操作区 */
  .actions{display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-top:26px}
  .btn{font:inherit; font-size:14px; cursor:pointer; text-decoration:none; color:var(--ink);
    background:transparent; border:1px solid var(--hair); border-radius:999px; padding:9px 18px;
    transition:background .2s ease, border-color .2s ease, transform .1s ease; white-space:nowrap}
  .btn:hover{background:#fff; border-color:var(--muted)}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--ink); color:var(--bg); border-color:var(--ink)}
  .btn.primary:hover{background:#403c37}
  .btn .ic{color:var(--muted); margin-right:7px}
  .btn.primary .ic{color:#cfc7ba}
  .spacer{flex:1 1 auto}

  /* 点赞 */
  .like{position:relative; display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    background:transparent; border:1px solid var(--hair); border-radius:999px; padding:8px 16px;
    color:var(--muted); font:inherit; font-size:14px; transition:border-color .2s ease, color .2s ease}
  .like:hover{border-color:var(--neg)}
  .like svg{width:18px; height:18px; overflow:visible}
  .like-count{font-size:13px; font-variant-numeric:tabular-nums; color:inherit; min-width:6px}
  .like.liked{cursor:default}
  .like svg path{fill:none; stroke:var(--neg); stroke-width:1.7; transition:fill .25s ease}
  .like.liked{color:var(--neg)}
  .like.liked svg path{fill:var(--neg)}
  .like.pop svg{animation:pop .42s ease}
  @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.32)}60%{transform:scale(.9)}100%{transform:scale(1)}}
  .float-heart{position:absolute; left:14px; top:6px; width:16px; height:16px; pointer-events:none;
    color:var(--neg); animation:floatup .9s ease-out forwards}
  .float-heart svg{width:16px;height:16px} .float-heart svg path{fill:var(--neg); stroke:none}
  @keyframes floatup{0%{opacity:.9; transform:translateY(0) scale(.8)}100%{opacity:0; transform:translateY(-46px) scale(1.1)}}

  footer{border-top:1px solid var(--hair); margin-top:40px; padding:40px 24px 64px; text-align:center; color:var(--muted); font-size:13px}
  footer a{color:var(--trans); text-decoration:none}

  /* 灯箱 */
  .lb{position:fixed; inset:0; background:rgba(35,30,26,.86); display:none; align-items:center; justify-content:center; padding:28px; z-index:60; cursor:zoom-out}
  .lb.open{display:flex}
  .lb img{max-width:100%; max-height:100%; border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,.4)}

  /* 笔记弹窗 */
  .modal{position:fixed; inset:0; background:rgba(35,30,26,.5); display:flex; align-items:center; justify-content:center;
    padding:24px; z-index:70; opacity:0; visibility:hidden; transition:opacity .28s ease, visibility .28s ease}
  .modal.open{opacity:1; visibility:visible}
  .panel{background:var(--card); width:min(780px,100%); max-height:88vh; border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 30px 80px rgba(50,35,20,.32);
    transform:translateY(14px) scale(.985); transition:transform .28s ease}
  .modal.open .panel{transform:translateY(0) scale(1)}
  .panel-bar{display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--hair); flex:0 0 auto}
  .panel-bar .t{font-size:14px; color:var(--muted); letter-spacing:.12em}
  .panel-close{background:transparent; border:none; cursor:pointer; color:var(--muted); font-size:22px; line-height:1; padding:4px 8px; border-radius:8px}
  .panel-close:hover{background:rgba(0,0,0,.05); color:var(--ink)}
  .note-body{overflow-y:auto; padding:28px 34px 40px; -webkit-overflow-scrolling:touch}
  .note-body h1{font-size:24px; letter-spacing:0; margin:.2em 0 .5em; text-align:left; cursor:auto}
  .note-body h2{font-size:19px; font-weight:600; margin:1.6em 0 .6em; padding-top:.4em; border-top:1px solid var(--hair)}
  .note-body h2:first-of-type{border-top:none; padding-top:0}
  .note-body h3{font-size:16px; font-weight:600; margin:1.2em 0 .4em}
  .note-body p{margin:.7em 0; font-size:15px}
  .note-body ul,.note-body ol{margin:.6em 0 .6em 1.3em} .note-body li{margin:.3em 0; font-size:15px}
  .note-body img{max-width:100%; height:auto; border-radius:10px; border:1px solid var(--hair); margin:.8em 0; display:block}
  .note-body blockquote{margin:1em 0; padding:.4em 1em; border-left:3px solid var(--trans); background:rgba(198,138,51,.07); color:#5f5a52; border-radius:0 8px 8px 0}
  .note-body code{background:rgba(0,0,0,.06); padding:.12em .4em; border-radius:5px; font-family:Consolas,Menlo,monospace; font-size:.9em}
  .note-body pre{background:#2f2d2a; color:#f2ece2; padding:16px; border-radius:10px; overflow-x:auto; margin:1em 0}
  .note-body pre code{background:none; padding:0; color:inherit; font-size:13px; line-height:1.7}
  .note-body table{width:100%; border-collapse:collapse; margin:1em 0; font-size:14px}
  .note-body th,.note-body td{border:1px solid var(--hair); padding:8px 10px; text-align:left}
  .note-body th{background:rgba(0,0,0,.04); font-weight:600}
  .note-loading{padding:48px; text-align:center; color:var(--muted)}

  .toast{position:fixed; left:50%; bottom:36px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--bg);
    padding:10px 20px; border-radius:999px; font-size:14px; opacity:0; transition:opacity .25s ease, transform .25s ease; z-index:80; pointer-events:none}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="masthead">目标是成为 PROMPT 大师</div>
  <h1 id="home-link">目标是成为 Prompt 大师</h1>
  <p class="tagline">面向 AIGC 小白的 prompt 拆解系列 · 不追结果,记录过程</p>
  <div class="accent">
    <span style="background:var(--narr)"></span><span style="background:var(--style)"></span>
    <span style="background:var(--trans)"></span><span style="background:var(--neg)"></span>
  </div>
</header>

<main class="wrap">
  <!-- 目录视图 -->
  <section id="catalog-view">
    <p class="intro">每一期挑一个 prompt battle 主题,讲清楚四件事:难在哪 → 怎么破题 → 完整 prompt → 四层拆解与可复用的思路。点开任意一期即读,不需要前置知识。</p>
    <div class="filters" id="filters"></div>
    <div class="catalog" id="catalog"></div>
  </section>

  <!-- 详情视图 -->
  <section id="detail-view" class="detail" hidden>
    <button class="back" id="back-btn"><span>←</span> 返回目录</button>
    <div id="detail-body"></div>
  </section>
</main>

<footer>源文件与每期归档 · <a href="https://github.com/Mr-Salticidae/becoming-a-prompt-master">GitHub 仓库</a><br>© 目标是成为 Prompt 大师</footer>

<div class="lb" id="lb"><img id="lb-img" src="" alt=""></div>

<div class="modal" id="modal">
  <div class="panel">
    <div class="panel-bar"><span class="t" id="modal-title">小白笔记</span><button class="panel-close" id="modal-close" aria-label="关闭">×</button></div>
    <div class="note-body" id="note-body"><div class="note-loading">正在加载…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
(function(){
  /* ===================== 期目数据(新增一期:加一个文件夹 + 在此加一条)===================== */
  // cat 用分类 key;分类的中文名与颜色在 CATS 里定义。每期资产统一放在 folder 下。
  var CATS = {
    abstract:{name:"抽象词破题", color:"var(--narr)"},
    object:  {name:"物件与尺度", color:"var(--trans)"}
  };
  var EPISODES = [
    {
      id:"ep01", no:"第 1 期", title:"《对话》", cat:"abstract",
      sub:"不画两个人说话,让两个时代做同一个动作——书写。",
      folder:"01_对话",
      cover:"对话_封面卡.png", breakdown:"对话_prompt拆解卡.png", original:"对话_原图.png",
      note:"对话_笔记.md", noteTitle:"第 1 期《对话》· 小白笔记",
      xhs:"http://xhslink.com/o/7bGNayYvE4f",
      prompt:"one continuous conceptual editorial illustration, a dialogue between two eras of writing, on the left an ancient robed scribe seated at a low wooden table carving oracle bone script into a large turtle shell with a bone stylus, on the right a modern figure seated at a workstation typing on a keyboard with binary digits drifting above the monitor, the two figures facing each other within the same shared room, warm pastel terracotta tones on the left melting gradually into cool periwinkle and lavender tones on the right, soft gradient color transition with no hard dividing line, a cloud of glowing oracle characters and binary digits floating between them, the glyph cloud gently bridging and blending the two color worlds, clean isometric perspective, flat color blocks, thin precise linework, controlled detail density, polished editorial article style, minimal background --no watermark, logo, blurry, low quality, photorealistic, 3d render, hard split line, frame border"
    },
    {
      id:"ep02", no:"第 2 期", title:"《童话镇里的纸飞机》", cat:"object",
      sub:"不让纸飞机飞,让它落地变成一座可攀爬的山——题眼物件,不当道具,当地貌。",
      folder:"02_纸飞机",
      cover:"纸飞机_封面卡.png", breakdown:"纸飞机_prompt拆解卡.png", original:"纸飞机_原图.png",
      note:"纸飞机_笔记.md", noteTitle:"第 2 期《童话镇里的纸飞机》· 小白笔记",
      xhs:"http://xhslink.com/o/7fSE1oGq5Ad",
      prompt:"a colorful LEGO fairy-tale town built around a gigantic handmade paper airplane that has landed in the town square, tiny LEGO villagers climbing onto the folded wings, children exploring the paper creases like mountains and valleys, colorful LEGO houses and castles surrounding the scene, bright blue sky, vivid primary colors, visible pencil doodles on the paper airplane made by a real child, joyful discovery, whimsical storytelling, photorealistic miniature photography, tilt-shift effect, vibrant palette, childhood imagination, magical realism --ar 3:4 --raw --v 8.1"
    }
  ];
  /* ============================================================================ */

  var $=function(s,r){return (r||document).querySelector(s);};
  var catalogView=$("#catalog-view"), detailView=$("#detail-view"),
      catalogEl=$("#catalog"), filtersEl=$("#filters"), detailBody=$("#detail-body");
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function epById(id){for(var i=0;i<EPISODES.length;i++){if(EPISODES[i].id===id)return EPISODES[i];}return null;}
  var heartSVG='<svg viewBox="0 0 24 24"><path d="M12 20.5C5.5 16 3 12.5 3 9.2 3 6.6 5 4.7 7.4 4.7c1.6 0 3 .8 3.8 2.1.2.3.6.3.8 0 .8-1.3 2.2-2.1 3.8-2.1C21 4.7 23 6.6 23 9.2c0 3.3-2.5 6.8-9 11.3-.6.4-1.4.4-2 0z" transform="translate(-1,0)"/></svg>';

  /* ---------- 目录:筛选 + 封面墙 ---------- */
  var activeFilter="all";
  function usedCats(){var seen={},out=[];EPISODES.forEach(function(e){if(!seen[e.cat]){seen[e.cat]=1;out.push(e.cat);}});return out;}
  function renderFilters(){
    var html='<button class="chip-f'+(activeFilter==="all"?" on":"")+'" data-f="all">全部</button>';
    usedCats().forEach(function(k){
      var c=CATS[k]||{name:k,color:"var(--muted)"};
      html+='<button class="chip-f'+(activeFilter===k?" on":"")+'" data-f="'+k+'"><span class="dot" style="background:'+c.color+'"></span>'+esc(c.name)+'</button>';
    });
    filtersEl.innerHTML=html;
  }
  function renderCatalog(){
    var list=EPISODES.slice().reverse().filter(function(e){return activeFilter==="all"||e.cat===activeFilter;});
    catalogEl.innerHTML=list.map(function(e){
      var c=CATS[e.cat]||{name:e.cat,color:"var(--muted)"};
      return '<article class="card" data-go="'+e.id+'">'+
        '<div class="cover"><img src="'+e.folder+'/'+e.cover+'" alt="'+esc(e.title)+'" loading="lazy"></div>'+
        '<div class="card-foot"><span class="card-no">'+esc(e.no)+'</span>'+
        '<span class="tag" style="background:'+c.color+'">'+esc(c.name)+'</span></div></article>';
    }).join("");
  }

  /* ---------- 详情页 ---------- */
  function renderDetail(e){
    var xhsBtn = e.xhs ? '<a class="btn" href="'+e.xhs+'" target="_blank" rel="noopener"><span class="ic">↗</span>小红书原帖</a>' : '';
    detailBody.innerHTML =
      '<article class="ep" data-folder="'+e.folder+'">'+
        '<div class="ep-head"><span class="ep-no">'+esc(e.no)+'</span><span class="ep-title">'+esc(e.title)+'</span></div>'+
        '<p class="ep-sub">'+esc(e.sub)+'</p>'+
        '<div class="gallery">'+
          '<figure><img src="'+e.folder+'/'+e.cover+'" alt="'+esc(e.title)+'封面" loading="lazy"><figcaption>封面</figcaption></figure>'+
          '<figure><img src="'+e.folder+'/'+e.breakdown+'" alt="prompt 四层拆解" loading="lazy"><figcaption>prompt 四层拆解</figcaption></figure>'+
        '</div>'+
        '<figure class="original"><img src="'+e.folder+'/'+e.original+'" alt="'+esc(e.title)+'原图" loading="lazy">'+
          '<figcaption>原图 · 点击放大,或 <a href="'+e.folder+'/'+e.original+'" download>下载原图</a></figcaption></figure>'+
        '<div class="actions">'+
          '<button class="btn primary copy-btn"><span class="ic">⧉</span>一键复制 Prompt</button>'+
          '<button class="btn note-btn" data-folder="'+e.folder+'" data-file="'+esc(e.note)+'" data-title="'+esc(e.noteTitle)+'"><span class="ic">▤</span>小白笔记</button>'+
          xhsBtn+
          '<span class="spacer"></span>'+
          '<button class="like" data-counter="'+e.id+'" aria-label="点赞">'+heartSVG+'<span class="like-txt">喜欢</span><span class="like-count" aria-hidden="true"></span></button>'+
        '</div>'+
        '<pre hidden class="prompt-src">'+esc(e.prompt)+'</pre>'+
      '</article>';
    initLike($(".like",detailBody));
  }

  /* ---------- 路由 ---------- */
  function showCatalog(){
    detailView.hidden=true; catalogView.hidden=false;
    renderFilters(); renderCatalog();
  }
  function showDetail(e){
    catalogView.hidden=true; detailView.hidden=false;
    renderDetail(e); window.scrollTo(0,0);
  }
  function route(){
    var h=location.hash.replace(/^#\/?/,"");
    var e=h?epById(h):null;
    if(e) showDetail(e); else showCatalog();
  }
  window.addEventListener("hashchange",route);
  $("#home-link").addEventListener("click",function(){location.hash="";});
  $("#back-btn").addEventListener("click",function(){location.hash="";});

  /* ---------- 全局事件委托 ---------- */
  // 进入详情
  catalogEl.addEventListener("click",function(ev){
    var card=ev.target.closest("[data-go]"); if(card) location.hash="#"+card.dataset.go;
  });
  // 筛选
  filtersEl.addEventListener("click",function(ev){
    var b=ev.target.closest("[data-f]"); if(!b)return; activeFilter=b.dataset.f; renderFilters(); renderCatalog();
  });

  // 灯箱
  var lb=$("#lb"), lbImg=$("#lb-img");
  document.addEventListener("click",function(ev){
    var im=ev.target.closest("figure img"); if(im){ lbImg.src=im.src; lb.classList.add("open"); }
  });
  lb.addEventListener("click",function(){ lb.classList.remove("open"); lbImg.src=""; });

  // Toast
  var toast=$("#toast"), tTimer;
  function showToast(msg){ toast.textContent=msg; toast.classList.add("show"); clearTimeout(tTimer); tTimer=setTimeout(function(){toast.classList.remove("show");},1600); }

  // 复制 Prompt
  document.addEventListener("click",function(ev){
    var btn=ev.target.closest(".copy-btn"); if(!btn)return;
    var pre=btn.closest(".ep").querySelector(".prompt-src"); var txt=pre.textContent.trim();
    var done=function(){ var old=btn.innerHTML; btn.innerHTML='<span class="ic">✓</span>已复制'; showToast("Prompt 已复制,去试试吧"); setTimeout(function(){btn.innerHTML=old;},1600); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(function(){fallback(txt,done);}); }
    else fallback(txt,done);
  });
  function fallback(txt,done){ var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity=0; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");done();}catch(e){} document.body.removeChild(ta); }

  // 笔记弹窗
  var modal=$("#modal"), noteBody=$("#note-body"), modalTitle=$("#modal-title"), modalClose=$("#modal-close");
  function closeModal(){ modal.classList.remove("open"); }
  modalClose.addEventListener("click",closeModal);
  modal.addEventListener("click",function(e){ if(e.target===modal) closeModal(); });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape"){ closeModal(); lb.classList.remove("open"); }});
  document.addEventListener("click",function(ev){
    var btn=ev.target.closest(".note-btn"); if(!btn)return;
    var folder=btn.dataset.folder, file=btn.dataset.file;
    modalTitle.textContent=btn.dataset.title||"小白笔记";
    noteBody.innerHTML='<div class="note-loading">正在加载…</div>';
    modal.classList.add("open");
    fetch(folder+"/"+encodeURIComponent(file)).then(function(r){ if(!r.ok) throw 0; return r.text(); })
      .then(function(md){
        noteBody.innerHTML = (window.marked?marked.parse(md):("<pre>"+md.replace(/[<>&]/g,"")+"</pre>"));
        noteBody.querySelectorAll("img").forEach(function(im){
          var raw=im.getAttribute("src")||"";
          if(!/^https?:|^\//.test(raw) && raw.indexOf(folder+"/")!==0){ im.src=folder+"/"+raw; }
        });
        noteBody.querySelectorAll("a[href]").forEach(function(a){ a.target="_blank"; a.rel="noopener"; });
        noteBody.scrollTop=0;
      })
      .catch(function(){ noteBody.innerHTML='<div class="note-loading">笔记加载失败,可前往 <a href="https://github.com/Mr-Salticidae/becoming-a-prompt-master/blob/main/'+folder+"/"+encodeURIComponent(file)+'" target="_blank" rel="noopener">GitHub 查看</a>。</div>'; });
  });

  // 点赞(全局计数:Abacus serverless · 每浏览器一次 · 轻动画)
  var ABACUS="https://abacus.jasoncameron.dev", NS="becoming-a-prompt-master";
  function initLike(btn){
    if(!btn)return;
    var counter=btn.dataset.counter, txt=btn.querySelector(".like-txt"), cnt=btn.querySelector(".like-count");
    var likedKey="liked_"+counter, liked=localStorage.getItem(likedKey)==="1";
    function setCount(n){ cnt.textContent = (typeof n==="number" && n>0) ? n : ""; }
    if(liked){ btn.classList.add("liked"); txt.textContent="已喜欢"; }
    fetch(ABACUS+"/get/"+NS+"/"+counter).then(function(r){ return r.ok?r.json():{value:0}; })
      .then(function(d){ setCount(d.value||0); }).catch(function(){});
    btn.addEventListener("click",function(){
      if(btn.classList.contains("liked")) return;
      btn.classList.add("liked"); txt.textContent="已喜欢"; localStorage.setItem(likedKey,"1");
      btn.classList.remove("pop"); void btn.offsetWidth; btn.classList.add("pop");
      var fh=document.createElement("span"); fh.className="float-heart"; fh.innerHTML=heartSVG;
      btn.appendChild(fh); setTimeout(function(){ fh.remove(); },900);
      setCount((parseInt(cnt.textContent,10)||0)+1);
      fetch(ABACUS+"/hit/"+NS+"/"+counter).then(function(r){ return r.json(); })
        .then(function(d){ if(d&&typeof d.value==="number") setCount(d.value); }).catch(function(){});
    });
  }

  route();
})();
</script>
</body>
